[platformio]
default_envs = esp32-api-test

[env]
platform = platformio/espressif32@~6.12.0
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
  adafruit/Adafruit BME680 Library
  bblanchon/ArduinoJson

[env:esp32-api-test]
build_src_filter =
  +<main_api_test.cpp>

[env:esp32-sensor]
build_src_filter =
  +<main_sensor.cpp>
