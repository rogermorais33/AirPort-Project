services:
  influxdb:
    image: docker.io/library/influxdb:2.7
    container_name: airport-influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin12345
      DOCKER_INFLUXDB_INIT_ORG: airport-project
      DOCKER_INFLUXDB_INIT_BUCKET: airport_telemetry
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: change-me

  api:
    build: .
    container_name: airport-fastapi
    depends_on:
      - influxdb
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app:/app/app

volumes:
  influxdb_data:
