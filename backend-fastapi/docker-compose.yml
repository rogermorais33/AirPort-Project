services:
  postgres:
    image: docker.io/library/postgres:16
    container_name: gazepilot-postgres
    environment:
      POSTGRES_DB: gazepilot
      POSTGRES_USER: gazepilot
      POSTGRES_PASSWORD: gazepilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gazepilot -d gazepilot"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: .
    container_name: gazepilot-backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic

  redis:
    image: docker.io/library/redis:7
    container_name: gazepilot-redis
    profiles: ["worker"]
    ports:
      - "6379:6379"

volumes:
  postgres_data:
