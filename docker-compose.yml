services:
  postgres:
    image: postgres:16
    container_name: gazepilot-postgres
    environment:
      POSTGRES_DB: gazepilot
      POSTGRES_USER: gazepilot
      POSTGRES_PASSWORD: gazepilot
    ports:
      - "5432:5432"
    volumes:
      - gazepilot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gazepilot -d gazepilot"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend-fastapi
    container_name: gazepilot-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://gazepilot:gazepilot@postgres:5432/gazepilot
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      FRAME_QUEUE_MODE: memory
      AUTO_CREATE_TABLES: "true"
    ports:
      - "8000:8000"

volumes:
  gazepilot_pgdata:
